<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>性別研究週報｜新世紀直男戰士</title>
  <style>
    :root {
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --text: #333333;
      --text-muted: #888888;
      --border: #eeeeee;
      --accent: #6200ea;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Noto Sans TC", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: white;
      padding: 2rem 1.5rem;
      text-align: center;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    header p { font-size: 0.9rem; opacity: 0.8; }
    .toolbar {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .week-select {
      padding: 0.4rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .filter-btn {
      padding: 0.3rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: white;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: var(--text);
      color: white;
      border-color: var(--text);
    }
    .main {
      max-width: 800px;
      margin: 0 auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .card {
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: transform 0.2s;
    }
    .card:hover { transform: translateY(-2px); }
    .card-header {
      padding: 1.25rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .badge {
      display: inline-block;
      color: white;
      font-size: 0.75rem;
      padding: 0.15rem 0.6rem;
      border-radius: 20px;
      margin-bottom: 0.5rem;
    }
    .podcast-score {
      float: right;
      font-size: 0.75rem;
      color: #F5A623;
    }
    .card-title {
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.4;
      margin: 0.5rem 0;
    }
    .tldr {
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 0.5rem;
      font-style: italic;
    }
    .meta {
      display: flex;
      gap: 1rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .card-body {
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .card-body h3 {
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      color: #444;
    }
    .card-body p, .card-body li {
      font-size: 0.9rem;
      color: #555;
    }
    .card-body ul { padding-left: 1.2rem; }
    .card-body li { margin-bottom: 0.25rem; }
    .editor-note {
      background: #fafafa;
      border-left: 3px solid #ddd;
      padding: 0.75rem;
      border-radius: 0 6px 6px 0;
      font-size: 0.875rem !important;
    }
    .btn {
      display: inline-block;
      padding: 0.6rem 1.2rem;
      background: #1a1a2e;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .empty { text-align: center; color: var(--text-muted); padding: 3rem; }
    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>📚 性別研究週報</h1>
    <p>新世紀直男戰士｜每週自動整理最新性別研究</p>
  </header>

  <div class="toolbar">
    <select class="week-select" onchange="changeWeek(this.value)">
      <option value="2026W13" selected>2026W13</option>
    </select>
    <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
      <button class="filter-btn active" data-cat="all">全部</button>

    </div>
  </div>

  <main class="main" id="cards-container">
    
  </main>

  <footer>
    <p>🤖 由 Claude AI 自動生成摘要｜最後更新：2026-03-25 07:34</p>
    <p style="margin-top:0.5rem">新世紀直男戰士 Podcast｜摘要僅供參考，研究詮釋以原文為準</p>
  </footer>

  <script>
    // 分類篩選
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        const cat = this.dataset.cat;
        document.querySelectorAll('.card').forEach(card => {
          card.style.display = (cat === 'all' || card.dataset.category === cat) ? '' : 'none';
        });
      });
    });

    // 週次切換（預留，完整實作需要多個 JSON 檔）
    function changeWeek(week) {
      window.location.href = week + '.html';
    }
  </script>
</body>
</html>
