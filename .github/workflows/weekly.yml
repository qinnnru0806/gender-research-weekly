name: 週報自動推播

on:
  schedule:
    - cron: '0 1 * * 1'   # UTC 01:00 = 台灣 09:00 每週一
  workflow_dispatch:
    inputs:
      dry_run:
        description: '只測試不推播 LINE'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

# ★ 關鍵修復：在最頂層設定 UTF-8 編碼 ★
# PYTHONIOENCODING 只在 Python 啟動時讀取，
# 所以必須在 env 層級設定，不能在 .py 裡面設
env:
  PYTHONIOENCODING: utf-8
  PYTHONUTF8: 1
  LANG: en_US.UTF-8
  LC_ALL: en_US.UTF-8

jobs:
  weekly-digest:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📚 Install dependencies
        run: pip install -r requirements.txt

      - name: 📡 Fetch RSS sources
        run: python scripts/fetch_sources.py

      - name: 🤖 Generate AI summaries
        run: |
          export LANG=en_US.UTF-8
          export LC_ALL=en_US.UTF-8
          python scripts/test_api.py || true
          echo "--- api_error.txt ---"
          cat api_error.txt 2>/dev/null || echo "(no error file)"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: 🌐 Generate static site
        run: python scripts/generate_site.py

      - name: 📲 Push LINE notification
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: python scripts/notify_line.py
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
          SITE_URL: ${{ secrets.SITE_URL }}

      - name: 💾 Commit data & site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "weekly update $(date +%Y-W%V)"
          git push
